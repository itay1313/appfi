<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>ItayReviews - ChatGPT iOS Reviews Explorer</title>
    <meta name="description" content="Explore 346,000+ ChatGPT iOS App Store reviews. Search by keyword, filter by star rating and language, and surface real user insights instantly." />
    <meta name="author" content="Itay Haephrati" />
    <meta name="robots" content="index, follow" />

    <!-- Theme colour (matches flame-orange primary) -->
    <meta name="theme-color" content="#ff3600" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a090f" media="(prefers-color-scheme: dark)" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="ItayReviews — ChatGPT iOS Reviews Explorer" />
    <meta property="og:description" content="Explore 346,000+ ChatGPT iOS App Store reviews. Search, filter by rating and language, and surface real user insights instantly." />
    <meta property="og:site_name"   content="ItayReviews" />
    <meta property="og:locale"      content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="ItayReviews — ChatGPT iOS Reviews Explorer" />
    <meta name="twitter:description" content="Explore 346,000+ ChatGPT iOS App Store reviews. Search, filter, and discover trends instantly." />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://appfigures.com" crossorigin />
    <link rel="dns-prefetch" href="https://appfigures.com" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ItayReviews",
      "description": "An explorer for ChatGPT iOS App Store reviews with search, filter, and analytics.",
      "applicationCategory": "UtilityApplication",
      "operatingSystem": "Web"
    }
    </script>
  </head>
  <body>
    <script>document.documentElement.lang="en";</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
